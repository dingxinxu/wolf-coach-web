name: Deploy

# 触发条件：push 到 main 或者手动
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 部署需要这个权限
permissions:
  contents: read
  pages: write
  id-token: write

# 串行部署，避免冲突
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      # 用 GitHub Pages 部署，需要 environment = github-pages
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 技能源已在仓库内 skill-source/，CI 直接同步即可
      - name: Check skill source
        run: |
          if [ ! -d "skill-source" ]; then
            echo "❌ skill-source 目录不存在"
            exit 1
          fi
          echo "✓ 使用仓库内 skill-source/"

      # 3. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 5. Install
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true
      - name: Install dependencies (retry without lockfile)
        if: failure()
        run: pnpm install

      # 5.5 跑单测（P1-11）：构建前验证，失败阻断部署，防 P0 类回归
      - name: Run tests
        run: pnpm test

      # 6. 同步技能 md 到 web/public/skill 和 worker/skill
      - name: Sync skill
        run: node scripts/sync-skill.js

      # 7. Inline skill md for worker (始终运行，确保 worker/skill-bundle.js 最新)
      - name: Inline skill for worker
        run: node scripts/inline-skill.js

      # 8. Build frontend
      - name: Build frontend
        env:
          VITE_WORKER_URL: ${{ vars.WORKER_URL }}
          # GitHub Pages 自动设置的 base path
          GH_PAGES_BASE: ${{ startsWith(github.repository, '/') && '/' || format('/{0}/', github.event.repository.name) }}
        run: pnpm build:web

      # 9. Upload Pages artifact
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/dist

      # 10. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-worker:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    # 仅当配置了 CF_API_TOKEN secret 时才部署 Worker
    if: ${{ vars.ENABLE_WORKER_DEPLOY == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install
        run: pnpm install

      - name: Sync skill
        run: node scripts/sync-skill.js

      - name: Inline skill for worker
        run: node scripts/inline-skill.js

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: worker
          # KV namespace id 需要在 wrangler.toml 里替换或在 CI 里 sed 替换
          command: deploy
