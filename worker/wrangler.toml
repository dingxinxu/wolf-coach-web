name = "wolf-coach-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 路由：
#  /            -> 健康检查
#  /api/chat    -> 教练分析（OpenAI 兼容转发 + 注入技能 md）
#  /api/health  -> 简单 ping
#  /admin/api/* -> 管理员维护 LLM 配置（受 CF Access 保护）

# KV：管理员维护的"共享 Key 池"配置
[[kv_namespaces]]
binding = "LLM_POOL"
id = "47a43b9a0e23497aa6e2177bd5327841"
preview_id = "88f9298e5aee4ef8be4a9b992da0dbc5"

# Worker Secret（用 wrangler secret put 设置，不要写在这里）：
#  - ADMIN_PASSWORD : admin 鉴权密码（X-Admin-Key 头比对）
#  - KV_ENC_KEY     : KV apiKey 加密密钥（base64，32 字节）

[vars]
# 默认 LLM 配置（用户没带自己的 Key 时，且管理员池也没配置时的兜底）
# 这里只放无敏感信息的默认值；真正的 API Key 必须走 secret 或 KV
# 自部署请通过 /admin 配置页填共享池配置（存 KV），不要改这里
DEFAULT_LLM_BASE_URL = "https://api.deepseek.com/v1"
DEFAULT_LLM_MODEL    = "deepseek-chat"
DEFAULT_LLM_REASONING = "medium"   # low / medium / high / disabled

# 默认 STT 配置（Groq Whisper large-v3，免费额度大、国内可访问）
DEFAULT_STT_BASE_URL = "https://api.groq.com/openai/v1"
DEFAULT_STT_MODEL    = "whisper-large-v3"

# CORS 白名单（逗号分隔的 origin，不含尾斜杠）
# 默认含 GitHub Pages 域名 + 本地开发 origin；自部署需补你的域名
# 留空 = 拒绝所有跨域请求（同 origin 仍可调）
ALLOWED_ORIGINS = "https://dingxinxu.github.io,http://localhost:5173,http://127.0.0.1:5173"
